name: CI

on:
  push:
  pull_request:

env:
  BLOGAGENT_SEARCH_PROVIDER: mock
  BLOGAGENT_LLM_PROVIDER: mock
  BLOGAGENT_USE_LLM_EDITOR: "false"
  BLOGAGENT_USE_LLM_FACTCHECK: "false"
  BLOGAGENT_USE_LLM_CITATION_JUDGE: "false"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q

      - name: Evals
        run: uv run python -m blogagent.evals.runner
